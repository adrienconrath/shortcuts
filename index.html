<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shortcuts</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f23;
      --card-bg: #16213e;
      --card-hover: #1a2744;
      --header-bg: #1a1a2e;
      --text: #e0e0e0;
      --text-secondary: #8892a4;
      --text-muted: #555b6e;
      --border: #2a2a4a;
      --accent: #4a90d9;
      --radius: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.4;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 40px;
      background: var(--header-bg);
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      gap: 10px;
    }

    .header-icon {
      width: 16px;
      height: 16px;
      color: var(--accent);
    }

    .header-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    /* ===== CATEGORIES GRID ===== */
    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    /* ===== CATEGORY CARD ===== */
    .category-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .category-accent {
      height: 2px;
      width: 100%;
    }

    .category-header {
      padding: 5px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
    }

    .category-name {
      font-size: 12px;
      font-weight: 600;
      flex: 1;
      padding: 2px 4px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== SHORTCUT ITEM ===== */
    .shortcut-item {
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid rgba(42, 42, 74, 0.3);
      transition: background 0.12s;
      min-height: 28px;
    }

    .shortcut-item:last-child { border-bottom: none; }
    .shortcut-item:hover { background: var(--card-hover); }

    .shortcut-content {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .shortcut-desc {
      font-size: 11px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 1;
      min-width: 0;
    }

    .shortcut-keys {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: nowrap;
      flex-shrink: 0;
    }

    /* ===== KEY BADGES ===== */
    .key-badge {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 0px 5px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      line-height: 18px;
      min-width: 18px;
      justify-content: center;
      box-shadow: 0 1px 1px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
      white-space: nowrap;
    }

    .key-badge.mod-cmd { background: #4a90d9; color: #fff; border: 1px solid #5a9fe9; }
    .key-badge.mod-ctrl { background: #e06c75; color: #fff; border: 1px solid #f07c85; }
    .key-badge.mod-alt { background: #e5c07b; color: #1a1a2e; border: 1px solid #f5d08b; }
    .key-badge.mod-shift { background: #98c379; color: #1a1a2e; border: 1px solid #a8d389; }
    .key-badge.mod-fn { background: #c678dd; color: #fff; border: 1px solid #d688ed; }
    .key-badge.regular { background: #2a2a4a; color: #c8c8c8; border: 1px solid #3a3a5a; }

    .key-sep {
      color: var(--text-muted);
      font-size: 8px;
      margin: 0 2px;
      font-weight: 500;
    }

    .command-badge {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      color: #61afef;
      background: #2a2a4a;
      padding: 0px 6px;
      border-radius: 3px;
      font-size: 10px;
      border: 1px solid #3a3a5a;
      display: inline-block;
      line-height: 18px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 800px) {
      .categories { grid-template-columns: 1fr; padding: 12px; gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        <line x1="6" y1="8" x2="6" y2="8"/><line x1="10" y1="8" x2="10" y2="8"/>
        <line x1="14" y1="8" x2="14" y2="8"/><line x1="18" y1="8" x2="18" y2="8"/>

        <line x1="10" y1="12" x2="14" y2="12"/>

    <main class="categories" id="categoriesContainer"></main>

            { "description": "Show/hide hidden files", "keys": { "modifiers": ["Cmd", "Shift"], "key": "." } },
            { "description": "Quick Look", "keys": { "modifiers": [], "key": "Space" } },
            { "description": "Get info (Finder)", "keys": { "modifiers": ["Cmd"], "key": "I" } },

          ]
        }
      ]
    };

    // ===== RENDER LOGIC =====
    const MODIFIER_STYLES = {
      Cmd:   { symbol: '\u2318', cls: 'mod-cmd' },
      Ctrl:  { symbol: '\u2303', cls: 'mod-ctrl' },
      Alt:   { symbol: '\u2325', cls: 'mod-alt' },
      Shift: { symbol: '\u21E7', cls: 'mod-shift' },
      Fn:    { symbol: 'fn', cls: 'mod-fn' },
    };

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function renderKeyBadges(keys) {
      const parts = [];
      for (const mod of (keys.modifiers || [])) {
        const s = MODIFIER_STYLES[mod];
        if (s) parts.push(`<span class="key-badge ${s.cls}" title="${mod}">${s.symbol}</span>`);
      }
      if (keys.key) {
        parts.push(`<span class="key-badge regular">${esc(keys.key)}</span>`);
      }
      return parts.join('<span class="key-sep">+</span>');
    }

    function renderItem(item) {
      let keysHTML = '';
      if (item.keys && ((item.keys.modifiers && item.keys.modifiers.length > 0) || item.keys.key)) {
        keysHTML = renderKeyBadges(item.keys);
      }
      if (item.command) {
        if (keysHTML) keysHTML += '<span class="key-sep" style="margin:0 6px">/</span>';
        keysHTML += `<span class="command-badge">${esc(item.command)}</span>`;
      }

      return `
        <div class="shortcut-item">
          <div class="shortcut-content">
            <div class="shortcut-desc" title="${esc(item.description)}">${esc(item.description)}</div>
            ${keysHTML ? '<div class="shortcut-keys">' + keysHTML + '</div>' : ''}
          </div>
        </div>`;
    }

    function renderCategory(cat) {
      return `
        <div class="category-card">
          <div class="category-accent" style="background:${cat.color}"></div>
          <div class="category-header">
            <span class="category-name">${esc(cat.name)}</span>
          </div>
          <div class="shortcut-list">
            ${cat.items.map(item => renderItem(item)).join('')}
          </div>
        </div>`;
    }

    function render() {
      document.getElementById('categoriesContainer').innerHTML =
        SHORTCUTS_DATA.categories.map(renderCategory).join('');
    }

    render();
  </script>

</html>
